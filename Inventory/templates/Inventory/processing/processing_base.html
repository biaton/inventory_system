{% extends "Inventory/base.html" %} 

{% block title %}Inventory Processing{% endblock %}

{% block content %}
<div class="w-full px-2 sm:px-4 mt-4 text-slate-800 dark:text-slate-200 font-sans transition-colors duration-300">
    
    <div class="border-b-2 border-slate-800 dark:border-slate-700 pb-2 mb-4 flex flex-col md:flex-row md:items-end md:justify-between transition-colors duration-300">
        <div>
            <h1 class="text-2xl font-black text-slate-900 dark:text-slate-100 uppercase tracking-tighter flex items-center gap-2 transition-colors duration-300">
                <i data-lucide="settings-2" class="w-6 h-6 text-indigo-700 dark:text-indigo-500"></i> Inventory Processing
            </h1>
        </div>
        <div class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest mt-2 md:mt-0 transition-colors duration-300">
            Internal Movement & Adjustments
        </div>
    </div>

    <div class="mb-4 bg-slate-100 dark:bg-slate-800/80 border border-slate-300 dark:border-slate-700 p-1 flex flex-wrap gap-1 shadow-sm transition-colors duration-300">
        
        <a href="{% url 'stock_move' %}" 
           class="flex-1 flex items-center justify-center px-4 py-1.5 text-[10px] md:text-xs font-black uppercase tracking-widest transition-colors 
           {% if request.resolver_match.url_name == 'stock_move' %} bg-teal-700 dark:bg-teal-600 text-white shadow-sm border border-teal-900 dark:border-teal-800 {% else %} text-slate-600 dark:text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-700 border border-transparent {% endif %}">
            <i data-lucide="arrow-right-left" class="w-3 h-3 mr-2"></i>
            <span class="hidden sm:inline">Stock Move</span>
        </a>
        
        <a href="{% url 'stock_correction' %}" 
           class="flex-1 flex items-center justify-center px-4 py-1.5 text-[10px] md:text-xs font-black uppercase tracking-widest transition-colors 
           {% if request.resolver_match.url_name == 'stock_correction' %} bg-amber-600 dark:bg-amber-600 text-white shadow-sm border border-amber-800 dark:border-amber-700 {% else %} text-slate-600 dark:text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-700 border border-transparent {% endif %}">
            <i data-lucide="file-edit" class="w-3 h-3 mr-2"></i>
            <span class="hidden sm:inline">Stock Correction</span>
        </a>

        <a href="{% url 'stock_out' %}" 
           class="flex-1 flex items-center justify-center px-4 py-1.5 text-[10px] md:text-xs font-black uppercase tracking-widest transition-colors 
           {% if request.resolver_match.url_name == 'stock_out' %} bg-rose-700 dark:bg-rose-600 text-white shadow-sm border border-rose-900 dark:border-rose-800 {% else %} text-slate-600 dark:text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-700 border border-transparent {% endif %}">
            <i data-lucide="package-minus" class="w-3 h-3 mr-2"></i>
            <span class="hidden sm:inline">Stock Out</span>
        </a>

    </div>

    <div class="transition-all duration-300 transform">
        {% block processing_content %}
        {% endblock %}
    </div>

</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        if (typeof lucide !== 'undefined') {
            lucide.createIcons();
        }
    });
</script>
{% endblock %}
