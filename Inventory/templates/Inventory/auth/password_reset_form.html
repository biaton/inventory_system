<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Password Recovery - ASIA Integrated Corp.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .bg-grid-pattern {
            background-image: linear-gradient(to right, #334155 1px, transparent 1px), linear-gradient(to bottom, #334155 1px, transparent 1px);
            background-size: 40px 40px;
        }
    </style>
</head>
<body class="bg-slate-200 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-xl w-full bg-white border border-slate-400 shadow-xl flex flex-col overflow-hidden">
        
        <div class="bg-slate-900 border-b border-teal-500 p-6 text-white bg-grid-pattern relative">
            <div class="absolute inset-0 bg-slate-900/90 pointer-events-none"></div>
            <div class="relative z-10 flex items-center gap-3">
                <i data-lucide="shield-alert" class="w-8 h-8 text-teal-400"></i>
                <div>
                    <h2 class="text-xl font-black tracking-tighter uppercase leading-none">Security Protocol</h2>
                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">Password Recovery Request</span>
                </div>
            </div>
        </div>

        <div class="p-8">
            <p class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-6 border-l-2 border-slate-300 pl-3">
                Enter your registered email address below. The system will dispatch a secure token link to reset your credentials.
            </p>

            <form method="POST" class="space-y-4">
                {% csrf_token %}
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-slate-600 uppercase tracking-widest">Registered Email Address</label>
                    <div class="relative">
                        <i data-lucide="mail" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                        <input type="email" name="email" required autofocus placeholder="e.g. j.doe@asiaintegrated.com"
                            class="w-full p-2.5 pl-9 bg-slate-50 border border-slate-400 text-xs font-black text-slate-800 focus:ring-1 focus:ring-teal-700 outline-none shadow-inner">
                    </div>
                </div>

                <div class="flex gap-2 mt-6 pt-4 border-t border-slate-200">
                    <button type="submit" class="flex-1 bg-slate-800 text-white border border-slate-900 py-2.5 font-black text-[11px] uppercase tracking-widest hover:bg-teal-700 transition-colors flex justify-center items-center gap-2 shadow-sm">
                        <i data-lucide="send" class="w-3.5 h-3.5"></i> Transmit Request
                    </button>
                    <a href="{% url 'login' %}" class="bg-slate-100 text-slate-600 border border-slate-400 px-6 py-2.5 font-black text-[11px] uppercase tracking-widest hover:bg-slate-200 transition-colors flex justify-center items-center">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>

    <script>lucide.createIcons();</script>
</body>
</html>
