{% extends "Inventory/auth/auth_base.html" %}
{% block title %}Verify Code{% endblock %}

{% block auth_content %}
<div class="w-full max-w-sm mx-auto text-center">
    <div class="mb-6">
        <div class="w-12 h-12 bg-sky-100 dark:bg-sky-900/30 rounded-full flex items-center justify-center mx-auto mb-4 border border-sky-200 dark:border-sky-800">
            <i data-lucide="mail-check" class="w-6 h-6 text-sky-600 dark:text-sky-400"></i>
        </div>
        <h2 class="text-2xl font-black text-slate-900 dark:text-slate-100 tracking-tighter uppercase mb-2">Verify Identity</h2>
        <p class="text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest leading-relaxed">
            We sent a 5-digit code to <br><span class="text-sky-600 dark:text-sky-400 font-black">{{ email }}</span>
        </p>
    </div>

    <form method="POST" id="otpForm" class="space-y-6">
        {% csrf_token %}
        <input type="hidden" name="otp" id="final_otp">
        
        <div class="flex justify-center gap-2 md:gap-3" id="otp-container">
            <input type="text" maxlength="1" class="otp-input w-12 h-14 text-center text-2xl font-black bg-slate-50 dark:bg-slate-950 border border-slate-400 dark:border-slate-600 text-slate-800 dark:text-slate-200 focus:border-sky-500 focus:ring-1 focus:ring-sky-700 dark:focus:ring-sky-500 outline-none rounded-none transition-all shadow-inner">
            <input type="text" maxlength="1" class="otp-input w-12 h-14 text-center text-2xl font-black bg-slate-50 dark:bg-slate-950 border border-slate-400 dark:border-slate-600 text-slate-800 dark:text-slate-200 focus:border-sky-500 focus:ring-1 focus:ring-sky-700 dark:focus:ring-sky-500 outline-none rounded-none transition-all shadow-inner">
            <input type="text" maxlength="1" class="otp-input w-12 h-14 text-center text-2xl font-black bg-slate-50 dark:bg-slate-950 border border-slate-400 dark:border-slate-600 text-slate-800 dark:text-slate-200 focus:border-sky-500 focus:ring-1 focus:ring-sky-700 dark:focus:ring-sky-500 outline-none rounded-none transition-all shadow-inner">
            <input type="text" maxlength="1" class="otp-input w-12 h-14 text-center text-2xl font-black bg-slate-50 dark:bg-slate-950 border border-slate-400 dark:border-slate-600 text-slate-800 dark:text-slate-200 focus:border-sky-500 focus:ring-1 focus:ring-sky-700 dark:focus:ring-sky-500 outline-none rounded-none transition-all shadow-inner">
            <input type="text" maxlength="1" class="otp-input w-12 h-14 text-center text-2xl font-black bg-slate-50 dark:bg-slate-950 border border-slate-400 dark:border-slate-600 text-slate-800 dark:text-slate-200 focus:border-sky-500 focus:ring-1 focus:ring-sky-700 dark:focus:ring-sky-500 outline-none rounded-none transition-all shadow-inner">
        </div>

        <button type="submit" id="verifyBtn" class="w-full bg-slate-800 dark:bg-sky-700 text-white border border-slate-900 dark:border-sky-800 py-3 font-black text-[11px] uppercase tracking-widest hover:bg-sky-700 dark:hover:bg-sky-600 transition-colors shadow-sm rounded-none">
            Verify & Proceed
        </button>
    </form>
</div>

<script>
    const inputs = document.querySelectorAll('.otp-input');
    const hiddenOtp = document.getElementById('final_otp');
    
    inputs.forEach((input, index) => {
        input.addEventListener('keyup', (e) => {
            if (e.key >= 0 && e.key <= 9) {
                if (index < inputs.length - 1) inputs[index + 1].focus();
            } else if (e.key === 'Backspace') {
                if (index > 0) inputs[index - 1].focus();
            }
            updateHiddenInput();
        });
        
        input.addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/[^0-9]/g, '');
            updateHiddenInput();
        });
    });

    function updateHiddenInput() {
        let code = '';
        inputs.forEach(input => code += input.value);
        hiddenOtp.value = code;
    }
</script>
{% endblock %}
