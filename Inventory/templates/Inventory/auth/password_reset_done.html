<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Transmission Success - ASIA Integrated Corp.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-200 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white border border-slate-400 shadow-xl flex flex-col overflow-hidden text-center p-8">
        
        <div class="w-16 h-16 bg-emerald-50 border border-emerald-200 rounded-full flex items-center justify-center mx-auto mb-4">
            <i data-lucide="mail-check" class="w-8 h-8 text-emerald-600"></i>
        </div>

        <h2 class="text-lg font-black tracking-tighter uppercase text-slate-800 mb-2">Transmission Verified</h2>
        
        <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest leading-relaxed mb-6">
            A secure recovery link has been dispatched to your email address. Please follow the instructions to reset your password. If you don't receive an email, verify that the address you entered is registered in the system.
        </p>

        <a href="{% url 'login' %}" class="bg-slate-800 text-white border border-slate-900 py-2.5 font-black text-[11px] uppercase tracking-widest hover:bg-slate-700 transition-colors block w-full shadow-sm">
            Return to Login Gateway
        </a>
        
    </div>

    <script>lucide.createIcons();</script>
</body>
</html>
