{% extends "auth/auth_base.html" %}

{% block title %}Request Transmitted{% endblock %}

{% block auth_content %}
<div class="w-full max-w-sm mx-auto text-center">
    <div class="w-16 h-16 bg-emerald-100 dark:bg-emerald-900/30 rounded-full flex items-center justify-center mx-auto mb-6 border border-emerald-200 dark:border-emerald-800">
        <i data-lucide="check-circle" class="w-8 h-8 text-emerald-600 dark:text-emerald-400"></i>
    </div>
    
    <h2 class="text-2xl font-black text-slate-900 dark:text-slate-100 uppercase tracking-tighter mb-2">Request Dispatched</h2>
    <p class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest leading-relaxed mb-8">
        We've sent a recovery link to your inbox. If the account exists, you should receive it shortly.
    </p>

    <a href="{% url 'login' %}" class="inline-block bg-slate-800 dark:bg-slate-700 text-white border border-slate-900 dark:border-slate-600 px-10 py-3 font-black text-[11px] uppercase tracking-widest hover:bg-black transition-all shadow-sm">
        Return to Gateway
    </a>
</div>
{% endblock %}
