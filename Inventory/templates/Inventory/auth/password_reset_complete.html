{% extends "Inventory/auth/auth_base.html" %}

{% block title %}Reset Successful{% endblock %}

{% block auth_content %}
<div class="w-full max-w-sm mx-auto text-center flex flex-col items-center justify-center">
    
    <!-- Success Icon (Ginawang Emerald Green para sa Success Status) -->
    <div class="w-16 h-16 bg-emerald-50 dark:bg-emerald-950/30 rounded-full flex items-center justify-center mx-auto mb-5 border border-emerald-200 dark:border-emerald-800/50 shadow-inner">
        <i data-lucide="shield-check" class="w-8 h-8 text-emerald-600 dark:text-emerald-500"></i>
    </div>
    
    <!-- Text Content -->
    <div class="mb-8 border-b-2 border-slate-100 dark:border-slate-800 pb-6 w-full transition-colors">
        <h2 class="text-2xl md:text-3xl font-black text-slate-900 dark:text-slate-100 uppercase tracking-tighter mb-2 transition-colors">Update Complete</h2>
        <p class="text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest leading-relaxed px-2 transition-colors">
            Your authentication credentials have been successfully updated. You may now securely access the system.
        </p>
    </div>

    <!-- Call to Action Button (ERP Square Style na katulad ng Login button) -->
    <a href="{% url 'login' %}" class="w-full bg-slate-800 dark:bg-sky-700 text-white border border-slate-900 dark:border-sky-800 py-3 font-black text-[11px] uppercase tracking-widest hover:bg-sky-700 dark:hover:bg-sky-600 transition-colors flex justify-center items-center gap-2 shadow-sm rounded-none">
        <i data-lucide="log-in" class="w-4 h-4"></i> Proceed to Login
    </a>
</div>
{% endblock %}
