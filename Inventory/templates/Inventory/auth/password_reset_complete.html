{% extends "auth/auth_base.html" %}

{% block title %}Reset Successful{% endblock %}

{% block auth_content %}
<div class="w-full max-w-sm mx-auto text-center">
    <div class="w-16 h-16 bg-sky-100 dark:bg-sky-900/30 rounded-full flex items-center justify-center mx-auto mb-6 border border-sky-200 dark:border-sky-800">
        <i data-lucide="shield-check" class="w-8 h-8 text-sky-600 dark:text-sky-400"></i>
    </div>
    
    <h2 class="text-2xl font-black text-slate-900 dark:text-slate-100 uppercase tracking-tighter mb-2">Update Complete</h2>
    <p class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest leading-relaxed mb-8">
        Your authentication credentials have been successfully updated. You may now access the system.
    </p>

    <a href="{% url 'login' %}" class="inline-block bg-sky-700 text-white px-10 py-3 font-black text-[11px] uppercase tracking-widest hover:bg-sky-800 transition-all shadow-md">
        Login Now
    </a>
</div>
{% endblock %}
