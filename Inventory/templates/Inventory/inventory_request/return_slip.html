{% extends "Inventory/inventory_request/request_base.html" %}

{% block request_content %}
<div class="w-full bg-white border border-slate-300 shadow-sm flex flex-col font-sans">

    <form method="POST" action="{% url 'return_slip' %}" class="flex flex-col">
        {% csrf_token %}
        
        <div class="bg-indigo-900 text-white px-4 py-2 flex justify-between items-center flex-shrink-0">
            <h2 class="text-xs font-black uppercase tracking-widest flex items-center gap-2">
                <i data-lucide="undo-2" class="w-4 h-4 text-indigo-300"></i> Material Return Slip (RTS)
            </h2>
            <span class="text-[10px] font-bold bg-indigo-800 px-2 py-0.5 rounded border border-indigo-600">
                Date: {% now "Y-m-d" %}
            </span>
        </div>

        <div class="bg-indigo-50 p-3 border-b border-indigo-200 grid grid-cols-4 gap-4">
            <div class="flex flex-col gap-1">
                <label class="text-[9px] font-black uppercase tracking-widest text-indigo-800">Original Request No. <span class="text-rose-500">*</span></label>
                <input type="text" name="ref_request_no" required placeholder="e.g. REQ-2026-01" class="p-1.5 text-xs font-bold border border-indigo-300 outline-none focus:border-indigo-600 bg-white shadow-sm uppercase">
            </div>
            <div class="flex flex-col gap-1">
                <label class="text-[9px] font-black uppercase tracking-widest text-indigo-800">Returning Dept <span class="text-rose-500">*</span></label>
                <select name="department" required class="p-1.5 text-xs font-bold border border-indigo-300 outline-none focus:border-indigo-600 bg-white shadow-sm">
                    <option value="">Select Department...</option>
                    <option value="Assembly Line 1">Assembly Line 1</option>
                    <option value="Assembly Line 2">Assembly Line 2</option>
                    <option value="Maintenance">Maintenance & Repair</option>
                </select>
            </div>
            <div class="flex flex-col gap-1 col-span-2">
                <label class="text-[9px] font-black uppercase tracking-widest text-indigo-800">Reason for Return <span class="text-rose-500">*</span></label>
                <input type="text" name="reason" required placeholder="e.g. Excess material, wrong item issued" class="p-1.5 text-xs font-bold border border-indigo-300 outline-none focus:border-indigo-600 bg-white shadow-sm">
            </div>
        </div>

        <div class="bg-white p-2 border-b border-slate-300 flex justify-between items-center shadow-sm z-10">
            <button type="button" onclick="addReturnRow()" class="bg-indigo-100 hover:bg-indigo-200 text-indigo-800 border border-indigo-300 px-3 py-1 text-[10px] font-black uppercase tracking-widest rounded shadow-sm transition-colors flex items-center gap-1">
                <i data-lucide="plus" class="w-3 h-3"></i> Add Return Item
            </button>
            
            <button type="submit" class="bg-indigo-700 hover:bg-indigo-600 text-white px-8 py-1.5 text-[10px] font-black uppercase tracking-widest rounded shadow-sm transition-colors border border-indigo-900 flex items-center gap-2">
                <i data-lucide="save" class="w-3 h-3"></i> Submit Return
            </button>
        </div>

        <div class="overflow-y-auto min-h-[300px] bg-slate-50">
            <table class="w-full text-left border-collapse text-[10px]" id="returnTable">
                <thead class="bg-slate-200 text-slate-700 uppercase tracking-widest font-black sticky top-0 shadow-sm z-10">
                    <tr class="divide-x divide-slate-300 border-b-2 border-slate-400">
                        <th class="py-1.5 px-2 w-12 text-center">Del</th>
                        <th class="py-1.5 px-2 w-48">Item Code <span class="text-rose-500">*</span></th>
                        <th class="py-1.5 px-2 w-40">Lot No. (If Known)</th>
                        <th class="py-1.5 px-2 w-32 text-right text-indigo-800 bg-indigo-100 border-x-2 border-indigo-300">Return Qty <span class="text-rose-500">*</span></th>
                        <th class="py-1.5 px-2">Condition Remarks</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-200 text-slate-800 bg-white" id="returnBody">
                    
                    <tr class="hover:bg-indigo-50 divide-x divide-slate-200 group">
                        <td class="py-1 px-1 text-center bg-white shadow-[2px_0_5px_-2px_rgba(0,0,0,0.1)]">
                            <button type="button" onclick="removeReturnRow(this)" class="text-slate-400 hover:text-rose-600 transition-colors">
                                <i data-lucide="x-circle" class="w-4 h-4 mx-auto"></i>
                            </button>
                        </td>
                        <td class="py-1 px-1">
                            <input type="text" name="ret_item_code[]" required placeholder="Type or Select Code..." 
                                list="item_master_list" autocomplete="off" oninput="fetchReturnItemDetails(this)" 
                                class="w-full uppercase font-black text-violet-900 border-none outline-none focus:bg-violet-50 px-1 py-0.5 placeholder-slate-300">
                        </td>
                        <td class="py-1 px-1">
                            <input type="text" name="ret_lot_no[]" placeholder="Scan/Type Lot..." class="w-full font-bold text-slate-600 border-none outline-none focus:bg-indigo-50 px-1 py-0.5 uppercase">
                        </td>
                        <td class="py-1 px-1 bg-indigo-50 focus-within:bg-white border-x-2 border-indigo-200">
                            <input type="number" name="ret_qty[]" required min="1" value="1" class="w-full text-right outline-none bg-transparent focus:ring-1 focus:ring-indigo-500 font-black font-mono text-indigo-700 px-1 py-0.5">
                        </td>
                        <td class="py-1 px-1">
                            <input type="text" name="ret_remarks[]" placeholder="Good condition? Damaged?" class="w-full font-bold text-slate-600 border-none outline-none focus:bg-indigo-50 px-1 py-0.5">
                        </td>
                    </tr>
                    
                </tbody>
            </table>
        </div>
    </form>
</div>

<datalist id="item_master_list">
    {% for item in items %}
        <option value="{{ item.item_code }}">{{ item.description }}</option>
    {% endfor %}
</datalist>

<script>
    function addReturnRow() {
        const tbody = document.getElementById('returnBody');
        const tr = document.createElement('tr');
        tr.className = "hover:bg-indigo-50 divide-x divide-slate-200 group";
        tr.innerHTML = `
            <td class="py-1 px-1 text-center bg-white shadow-[2px_0_5px_-2px_rgba(0,0,0,0.1)]">
                <button type="button" onclick="removeReturnRow(this)" class="text-slate-400 hover:text-rose-600 transition-colors">
                    <i data-lucide="x-circle" class="w-4 h-4 mx-auto"></i>
                </button>
            </td>
            <td class="py-1 px-1">
                <input type="text" name="ret_item_code[]" required placeholder="Type or Select Code..." 
                    list="item_master_list" autocomplete="off" oninput="fetchReturnItemDetails(this)" 
                    class="w-full uppercase font-black text-violet-900 border-none outline-none focus:bg-violet-50 px-1 py-0.5 placeholder-slate-300">
            </td>
            <td class="py-1 px-1">
                <input type="text" name="ret_lot_no[]" placeholder="Scan/Type Lot..." class="w-full font-bold text-slate-600 border-none outline-none focus:bg-indigo-50 px-1 py-0.5 uppercase">
            </td>
            <td class="py-1 px-1 bg-indigo-50 focus-within:bg-white border-x-2 border-indigo-200">
                <input type="number" name="ret_qty[]" required min="1" value="1" class="w-full text-right outline-none bg-transparent focus:ring-1 focus:ring-indigo-500 font-black font-mono text-indigo-700 px-1 py-0.5">
            </td>
            <td class="py-1 px-1">
                <input type="text" name="ret_remarks[]" placeholder="Good condition? Damaged?" class="w-full font-bold text-slate-600 border-none outline-none focus:bg-indigo-50 px-1 py-0.5">
            </td>
        `;
        tbody.appendChild(tr);
        if (typeof lucide !== 'undefined') lucide.createIcons();
    }

    function removeReturnRow(btn) {
        const tbody = document.getElementById('returnBody');
        if (tbody.children.length > 1) {
            btn.closest('tr').remove();
        } else {
            alert("You must return at least one item.");
        }
    }

    function fetchReturnItemDetails(inputElement) {
        let rawValue = inputElement.value;
        if (!rawValue) return;

        const code = rawValue.trim().toUpperCase();
        if (code.length < 2) return;

        const tr = inputElement.closest('tr');
        
        // PAALALA: I-check mo kung ano ang pangalan ng Description input mo sa Return Slip. 
        // Kung 'ret_item_desc[]' ang name niya, palitan mo yung nasa baba.
        // Gumamit ako ng wildcard (^=) para kahit anong name basta may 'desc' ay mahahanap niya.
        const descInput = tr.querySelector('input[name*="desc"]'); 

        if (!descInput) return; // Kung walang description box, wag nang ituloy

        descInput.value = "Searching Database...";
        descInput.classList.remove('text-rose-600', 'text-emerald-700');
        descInput.classList.add('text-amber-500', 'animate-pulse');

        const apiUrl = `/api/get-item-details/?code=${encodeURIComponent(code)}&item_code=${encodeURIComponent(code)}`;

        fetch(apiUrl)
            .then(response => {
                if (!response.ok) throw new Error('Network response was not ok');
                return response.json();
            })
            .then(data => {
                descInput.classList.remove('text-amber-500', 'animate-pulse');
            
                if (data.success) {
                    descInput.value = data.description; // Description lang, wag na yung Live Stock kasi magbabalik naman sila
                    descInput.classList.add('text-emerald-700');
                } else {
                    descInput.value = data.error || "Item not found!";
                    descInput.classList.add('text-rose-600');
                }
            })
            .catch(err => {
                descInput.classList.remove('text-amber-500', 'animate-pulse');
                descInput.value = "Error connecting to server.";
                descInput.classList.add('text-rose-600');
            });
    }
</script>
{% endblock %}
