{% extends "Inventory/inventory_request/request_base.html" %}

{% block request_content %}
<div class="w-full bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-700 shadow-sm flex flex-col font-sans transition-colors duration-300">

    <form method="POST" action="{% url 'return_slip' %}" class="flex flex-col">
        {% csrf_token %}
        
        <div class="bg-indigo-900 dark:bg-indigo-950 text-white px-4 py-2 flex justify-between items-center flex-shrink-0">
            <h2 class="text-xs font-black uppercase tracking-widest flex items-center gap-2">
                <i data-lucide="undo-2" class="w-4 h-4 text-indigo-300"></i> Material Return Slip (RTS)
            </h2>
            <span class="text-[10px] font-bold bg-indigo-800 dark:bg-indigo-900 px-2 py-0.5 rounded border border-indigo-600 dark:border-indigo-700">
                Date: {% now "Y-m-d" %}
            </span>
        </div>

        <div class="bg-indigo-50 dark:bg-indigo-900/10 p-3 border-b border-indigo-200 dark:border-indigo-800/50 grid grid-cols-1 md:grid-cols-4 gap-4 transition-colors">
            <div class="flex flex-col gap-1">
                <label class="text-[9px] font-black uppercase tracking-widest text-indigo-800 dark:text-indigo-400">Original Request No. <span class="text-rose-500">*</span></label>
                <input type="text" name="ref_request_no" required placeholder="e.g. REQ-2026-01" 
                       class="p-1.5 text-xs font-bold border border-indigo-300 dark:border-indigo-800 outline-none focus:border-indigo-600 dark:focus:border-indigo-500 bg-white dark:bg-slate-950 dark:text-slate-200 shadow-sm uppercase transition-colors">
            </div>
            <div class="flex flex-col gap-1">
                <label class="text-[9px] font-black uppercase tracking-widest text-indigo-800 dark:text-indigo-400">Returning Dept <span class="text-rose-500">*</span></label>
                <select name="department" required class="p-1.5 text-xs font-bold border border-indigo-300 dark:border-indigo-800 outline-none focus:border-indigo-600 dark:focus:border-indigo-500 bg-white dark:bg-slate-950 dark:text-slate-200 shadow-sm transition-colors">
                    <option value="">Select Department...</option>
                    <option value="Assembly Line 1">Assembly Line 1</option>
                    <option value="Assembly Line 2">Assembly Line 2</option>
                    <option value="Maintenance">Maintenance & Repair</option>
                    <option value="Packaging">Packaging Dept</option>
                </select>
            </div>
            <div class="flex flex-col gap-1 col-span-2">
                <label class="text-[9px] font-black uppercase tracking-widest text-indigo-800 dark:text-indigo-400">Reason for Return <span class="text-rose-500">*</span></label>
                <input type="text" name="reason" required placeholder="e.g. Excess material, wrong item issued" 
                       class="p-1.5 text-xs font-bold border border-indigo-300 dark:border-indigo-800 outline-none focus:border-indigo-600 dark:focus:border-indigo-500 bg-white dark:bg-slate-950 dark:text-slate-200 shadow-sm transition-colors placeholder-slate-400 dark:placeholder-slate-600">
            </div>
        </div>

        <div class="bg-white dark:bg-slate-900 p-2 border-b border-slate-300 dark:border-slate-700 flex justify-between items-center shadow-sm z-10 transition-colors">
            <button type="button" onclick="addReturnRow()" class="bg-indigo-100 dark:bg-indigo-900/30 hover:bg-indigo-200 dark:hover:bg-indigo-900/50 text-indigo-800 dark:text-indigo-300 border border-indigo-300 dark:border-indigo-800 px-3 py-1 text-[10px] font-black uppercase tracking-widest rounded shadow-sm transition-all flex items-center gap-1">
                <i data-lucide="plus" class="w-3 h-3"></i> Add Return Item
            </button>
            
            <button type="submit" class="bg-indigo-700 dark:bg-indigo-600 hover:bg-indigo-600 dark:hover:bg-indigo-500 text-white px-8 py-1.5 text-[10px] font-black uppercase tracking-widest rounded shadow-sm transition-all border border-indigo-900 flex items-center gap-2">
                <i data-lucide="save" class="w-3 h-3"></i> Submit Return
            </button>
        </div>

        <div class="overflow-y-auto min-h-[300px] bg-slate-50 dark:bg-slate-950 transition-colors">
            <table class="w-full text-left border-collapse text-[10px]" id="returnTable">
                <thead class="bg-slate-200 dark:bg-slate-800 text-slate-700 dark:text-slate-300 uppercase tracking-widest font-black sticky top-0 shadow-sm z-10 transition-colors">
                    <tr class="divide-x divide-slate-300 dark:divide-slate-700 border-b-2 border-slate-400 dark:border-slate-900">
                        <th class="py-1.5 px-2 w-12 text-center">Del</th>
                        <th class="py-1.5 px-2 w-48">Item Code <span class="text-rose-500">*</span></th>
                        <th class="py-1.5 px-2 w-40">Lot No. (If Known)</th>
                        <th class="py-1.5 px-2 w-32 text-right text-indigo-800 dark:text-indigo-400 bg-indigo-100 dark:bg-indigo-900/40 border-x-2 border-indigo-300 dark:border-indigo-800 transition-colors">Return Qty <span class="text-rose-500">*</span></th>
                        <th class="py-1.5 px-2">Condition Remarks</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-200 dark:divide-slate-800 text-slate-800 dark:text-slate-200 bg-white dark:bg-slate-900 transition-colors" id="returnBody">
                    
                    <tr class="hover:bg-indigo-50 dark:hover:bg-indigo-900/20 divide-x divide-slate-200 dark:divide-slate-800 group">
                        <td class="py-1 px-1 text-center bg-white dark:bg-slate-900 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.1)] dark:shadow-none">
                            <button type="button" onclick="removeReturnRow(this)" class="text-slate-400 dark:text-slate-600 hover:text-rose-600 dark:hover:text-rose-400 transition-colors">
                                <i data-lucide="x-circle" class="w-4 h-4 mx-auto"></i>
                            </button>
                        </td>
                        <td class="py-1 px-1">
                            <input type="text" name="ret_item_code[]" required placeholder="Type or Select Code..." 
                                list="item_master_list" autocomplete="off" oninput="fetchReturnItemDetails(this)" 
                                class="w-full uppercase font-black text-violet-900 dark:text-violet-400 border-none outline-none bg-transparent focus:bg-violet-50 dark:focus:bg-indigo-900/30 px-1 py-0.5 placeholder-slate-300 dark:placeholder-slate-700">
                        </td>
                        <td class="py-1 px-1">
                            <input type="text" name="ret_lot_no[]" placeholder="Scan/Type Lot..." class="w-full font-bold text-slate-600 dark:text-slate-400 border-none outline-none bg-transparent focus:bg-indigo-50 dark:focus:bg-indigo-900/30 px-1 py-0.5 uppercase placeholder-slate-300 dark:placeholder-slate-700">
                        </td>
                        <td class="py-1 px-1 bg-indigo-50 dark:bg-indigo-900/20 focus-within:bg-white dark:focus-within:bg-slate-950 border-x-2 border-indigo-200 dark:border-indigo-800 transition-colors">
                            <input type="number" name="ret_qty[]" required min="1" value="1" class="w-full text-right outline-none bg-transparent focus:ring-0 font-black font-mono text-indigo-700 dark:text-indigo-400 px-1 py-0.5">
                        </td>
                        <td class="py-1 px-1">
                            <input type="text" name="ret_remarks[]" placeholder="Good condition? Damaged?" class="w-full font-bold text-slate-600 dark:text-slate-400 border-none outline-none bg-transparent focus:bg-indigo-50 dark:focus:bg-indigo-900/30 px-1 py-0.5 placeholder-slate-300 dark:placeholder-slate-700">
                        </td>
                    </tr>
                    
                </tbody>
            </table>
        </div>
    </form>
</div>

<datalist id="item_master_list">
    {% for item in items %}
        <option value="{{ item.item_code }}">{{ item.description }}</option>
    {% endfor %}
</datalist>

<script>
    function addReturnRow() {
        const tbody = document.getElementById('returnBody');
        const tr = document.createElement('tr');
        tr.className = "hover:bg-indigo-50 dark:hover:bg-indigo-900/20 divide-x divide-slate-200 dark:divide-slate-800 group transition-colors";
        tr.innerHTML = `
            <td class="py-1 px-1 text-center bg-white dark:bg-slate-900 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.1)] dark:shadow-none">
                <button type="button" onclick="removeReturnRow(this)" class="text-slate-400 dark:text-slate-600 hover:text-rose-600 dark:hover:text-rose-400 transition-colors">
                    <i data-lucide="x-circle" class="w-4 h-4 mx-auto"></i>
                </button>
            </td>
            <td class="py-1 px-1">
                <input type="text" name="ret_item_code[]" required placeholder="Type or Select Code..." 
                    list="item_master_list" autocomplete="off" oninput="fetchReturnItemDetails(this)" 
                    class="w-full uppercase font-black text-violet-900 dark:text-violet-400 border-none outline-none bg-transparent focus:bg-violet-50 dark:focus:bg-indigo-900/30 px-1 py-0.5 placeholder-slate-300 dark:placeholder-slate-700">
            </td>
            <td class="py-1 px-1">
                <input type="text" name="ret_lot_no[]" placeholder="Scan/Type Lot..." class="w-full font-bold text-slate-600 dark:text-slate-400 border-none outline-none bg-transparent focus:bg-indigo-50 dark:focus:bg-indigo-900/30 px-1 py-0.5 uppercase placeholder-slate-300 dark:placeholder-slate-700">
            </td>
            <td class="py-1 px-1 bg-indigo-50 dark:bg-indigo-900/20 focus-within:bg-white dark:focus-within:bg-slate-950 border-x-2 border-indigo-200 dark:border-indigo-800 transition-colors">
                <input type="number" name="ret_qty[]" required min="1" value="1" class="w-full text-right outline-none bg-transparent focus:ring-0 font-black font-mono text-indigo-700 dark:text-indigo-400 px-1 py-0.5">
            </td>
            <td class="py-1 px-1">
                <input type="text" name="ret_remarks[]" placeholder="Good condition? Damaged?" class="w-full font-bold text-slate-600 dark:text-slate-400 border-none outline-none bg-transparent focus:bg-indigo-50 dark:focus:bg-indigo-900/30 px-1 py-0.5 placeholder-slate-300 dark:placeholder-slate-700">
            </td>
        `;
        tbody.appendChild(tr);
        if (typeof lucide !== 'undefined') lucide.createIcons();
    }

    function removeReturnRow(btn) {
        const tbody = document.getElementById('returnBody');
        if (tbody.children.length > 1) {
            btn.closest('tr').remove();
        } else {
            alert("You must return at least one item.");
        }
    }

    function fetchReturnItemDetails(inputElement) {
        let rawValue = inputElement.value;
        if (!rawValue) return;

        const code = rawValue.trim().toUpperCase();
        if (code.length < 2) return;

        const tr = inputElement.closest('tr');
        const descInput = tr.querySelector('input[name*="desc"]'); 

        if (!descInput) return;

        descInput.value = "Searching Database...";
        descInput.classList.remove('text-rose-600', 'text-emerald-700', 'dark:text-rose-400', 'dark:text-emerald-400');
        descInput.classList.add('text-amber-500', 'animate-pulse');

        const apiUrl = `/api/get-item-details/?code=${encodeURIComponent(code)}&item_code=${encodeURIComponent(code)}`;

        fetch(apiUrl)
            .then(response => {
                if (!response.ok) throw new Error('Network response was not ok');
                return response.json();
            })
            .then(data => {
                descInput.classList.remove('text-amber-500', 'animate-pulse');
            
                if (data.success) {
                    descInput.value = data.description; 
                    descInput.classList.add('text-emerald-700', 'dark:text-emerald-400');
                } else {
                    descInput.value = data.error || "Item not found!";
                    descInput.classList.add('text-rose-600', 'dark:text-rose-400');
                }
            })
            .catch(err => {
                descInput.classList.remove('text-amber-500', 'animate-pulse');
                descInput.value = "Error connecting to server.";
                descInput.classList.add('text-rose-600', 'dark:text-rose-400');
            });
    }
</script>
{% endblock %}
