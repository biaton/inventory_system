{% extends "Inventory/base.html" %} 

{% block title %}Purchase Order{%endblock %} 

{% block content %}
<div class="w-full px-2 sm:px-4 mt-4 text-slate-800">

    <div class="border-b-2 border-slate-800 pb-2 mb-4 flex flex-col md:flex-row md:items-end md:justify-between">
        <div>
            <h1 class="text-2xl font-black text-slate-900 uppercase tracking-tighter flex items-center gap-2">
                <i data-lucide="shopping-bag" class="w-6 h-6 text-teal-700"></i> Purchase Order Management
            </h1>
        </div>
        <div class="text-xs font-bold text-slate-500 uppercase tracking-widest mt-2 md:mt-0">
            Procurement Control Panel
        </div>
    </div>

    <div class="mb-4 bg-slate-100 border border-slate-300 p-1 flex flex-wrap gap-1 shadow-sm">
        
        <a href="{% url 'make_po' %}" 
           class="flex-1 flex items-center justify-center px-4 py-1.5 text-[10px] md:text-xs font-black uppercase tracking-widest transition-colors 
           {% if request.resolver_match.url_name == 'make_po' %} bg-teal-700 text-white shadow-sm border border-teal-900 {% else %} text-slate-600 hover:bg-slate-200 border border-transparent {% endif %}">
            <i data-lucide="file-plus" class="w-3 h-3 mr-2"></i>
            <span class="hidden sm:inline">Make PO</span>
        </a>

        <a href="{% url 'po_confirm_purchase' %}" 
           class="flex-1 flex items-center justify-center px-4 py-1.5 text-[10px] md:text-xs font-black uppercase tracking-widest transition-colors 
           {% if request.resolver_match.url_name == 'po_confirm_purchase' %} bg-teal-700 text-white shadow-sm border border-teal-900 {% else %} text-slate-600 hover:bg-slate-200 border border-transparent {% endif %}">
            <i data-lucide="shield-check" class="w-3 h-3 mr-2"></i>
            <span class="hidden sm:inline">Confirm</span>
        </a>

        <a href="{% url 'approve_po' %}" 
           class="flex-1 flex items-center justify-center px-4 py-1.5 text-[10px] md:text-xs font-black uppercase tracking-widest transition-colors 
           {% if request.resolver_match.url_name == 'approve_po' %} bg-teal-700 text-white shadow-sm border border-teal-900 {% else %} text-slate-600 hover:bg-slate-200 border border-transparent {% endif %}">
            <i data-lucide="check-circle" class="w-3 h-3 mr-2"></i>
            <span class="hidden sm:inline">Approve</span>
        </a>

        <a href="{% url 'po_inquiry' %}" 
           class="flex-1 flex items-center justify-center px-4 py-1.5 text-[10px] md:text-xs font-black uppercase tracking-widest transition-colors 
           {% if request.resolver_match.url_name == 'po_inquiry' %} bg-teal-700 text-white shadow-sm border border-teal-900 {% else %} text-slate-600 hover:bg-slate-200 border border-transparent {% endif %}">
            <i data-lucide="search" class="w-3 h-3 mr-2"></i>
            <span class="hidden sm:inline">Inquiry</span>
        </a>

        <a href="{% url 'po_correction' %}" 
           class="flex-1 flex items-center justify-center px-4 py-1.5 text-[10px] md:text-xs font-black uppercase tracking-widest transition-colors 
           {% if request.resolver_match.url_name == 'po_correction' %} bg-amber-600 text-white shadow-sm border border-amber-800 {% else %} text-slate-600 hover:bg-slate-200 border border-transparent {% endif %}">
            <i data-lucide="edit-3" class="w-3 h-3 mr-2"></i>
            <span class="hidden sm:inline">Correction</span>
        </a>
    </div>

    <div class="transition-all duration-300 transform">
        {% block po_content %} 
        {% endblock %}
    </div>

</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        if (typeof lucide !== 'undefined') {
            lucide.createIcons();
        }
    });
</script>
{% endblock %}
