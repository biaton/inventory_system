<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>New User Alert</title></head>
<body style="margin: 0; padding: 0; font-family: Arial, sans-serif; background-color: #f8fafc; color: #334155;">
    <table width="100%" cellpadding="0" cellspacing="0" style="padding: 20px;">
        <tr><td align="center">
            <table width="600" cellpadding="0" cellspacing="0" style="background-color: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
                <tr>
                    <td style="background-color: #4f46e5; padding: 20px; text-align: center;">
                        <h2 style="margin: 0; color: #ffffff; font-size: 20px; letter-spacing: 2px; text-transform: uppercase;">👋 New User Registered</h2>
                    </td>
                </tr>
                <tr>
                    <td style="padding: 30px;">
                        <p style="margin: 0 0 15px 0; font-size: 16px;">Hello Admin,</p>
                        <p style="margin: 0 0 20px 0; font-size: 14px; line-height: 1.6;">A new user account has been successfully created in the WMS System. Please review their access level if necessary.</p>
                        
                        <table width="100%" cellpadding="15" cellspacing="0" style="background-color: #eef2ff; border-left: 4px solid #4338ca; border-radius: 4px;">
                            <tr><td>
                                <p style="margin: 0 0 8px 0; font-size: 12px; color: #4f46e5; text-transform: uppercase;">Account Profile</p>
                                <p style="margin: 0 0 5px 0; font-size: 14px;"><strong>Username:</strong> <span style="color: #312e81;">{{ username }}</span></p>
                                <p style="margin: 0 0 5px 0; font-size: 14px;"><strong>System Role:</strong> {{ role }}</p>
                                <p style="margin: 0 0 0 0; font-size: 14px;"><strong>Department:</strong> {{ company_name }}</p>
                            </td></tr>
                        </table>
                    </td>
                </tr>
                <tr>
                    <td style="background-color: #1e293b; padding: 15px; text-align: center;">
                        <p style="margin: 0; color: #94a3b8; font-size: 11px; text-transform: uppercase; letter-spacing: 1px;">ASIA Integrated Corp. • Admin Module</p>
                    </td>
                </tr>
            </table>
        </td></tr>
    </table>
</body>
</html>
