{% extends "Inventory/base.html" %} 

{% block title %}Delivery confirmation{% endblock %}

{% block content %}
<div class="w-full px-2 sm:px-4 mt-4 text-slate-800 font-sans">
    
    <div class="border-b-2 border-slate-800 pb-2 mb-4 flex flex-col md:flex-row md:items-end md:justify-between">
        <div>
            <h1 class="text-2xl font-black text-slate-900 uppercase tracking-tighter flex items-center gap-2">
                <i data-lucide="truck" class="w-6 h-6 text-emerald-700"></i> Delivery confirmation  
            </h1>
        </div>
        <div class="text-xs font-bold text-slate-500 uppercase tracking-widest mt-2 md:mt-0">
            Supplier Deliveries & Allocation
        </div>
    </div>

    <div class="mb-4 bg-slate-100 border border-slate-300 p-1 flex flex-wrap gap-1 shadow-sm">
        
        <a href="{% url 'shipment_import' %}" 
           class="flex-1 flex items-center justify-center px-4 py-1.5 text-[10px] md:text-xs font-black uppercase tracking-widest transition-colors 
           {% if request.resolver_match.url_name == 'shipment_import' %} bg-emerald-700 text-white shadow-sm border border-emerald-900 {% else %} text-slate-600 hover:bg-slate-200 border border-transparent {% endif %}">
            <i data-lucide="file-up" class="w-3 h-3 mr-2"></i>
            <span class="hidden sm:inline">Shipment Schedule Import</span>
        </a>

        <a href="{% url 'shipment_inquiry' %}" 
           class="flex-1 flex items-center justify-center px-4 py-1.5 text-[10px] md:text-xs font-black uppercase tracking-widest transition-colors 
           {% if request.resolver_match.url_name == 'shipment_inquiry' %} bg-teal-700 text-white shadow-sm border border-teal-900 {% else %} text-slate-600 hover:bg-slate-200 border border-transparent {% endif %}">
            <i data-lucide="clipboard-list" class="w-3 h-3 mr-2"></i>
            <span class="hidden sm:inline">Shipment Schedule Inquiry</span>
        </a>

        <a href="{% url 'shipping_confirmation_base' %}" 
           class="flex-1 flex items-center justify-center px-4 py-1.5 text-[10px] md:text-xs font-black uppercase tracking-widest transition-colors 
           {% if request.resolver_match.url_name == 'shipping_confirmation' %} bg-amber-600 text-white shadow-sm border border-amber-800 {% else %} text-slate-600 hover:bg-slate-200 border border-transparent {% endif %}">
            <i data-lucide="shield-check" class="w-3 h-3 mr-2"></i>
            <span class="hidden sm:inline">shipping Confirmation</span>
        </a>

    </div>

    <div class="transition-all duration-300 transform">
        {% block inbound_content %}
        {% endblock %}
    </div>

</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        if (typeof lucide !== 'undefined') {
            lucide.createIcons();
        }
    });
</script>
{% endblock %}
