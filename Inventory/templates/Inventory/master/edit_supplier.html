{% extends "Inventory/master/master_base.html" %}

{% block master_content %}
<div class="max-w-3xl mx-auto pb-20 mt-4 text-slate-800">
    
    <div class="mb-4 flex justify-between items-center">
        <a href="{% url 'supplier_master' %}" class="text-[10px] font-black uppercase tracking-widest text-slate-500 hover:text-teal-700 flex items-center gap-1 transition-colors">
            <i data-lucide="arrow-left" class="w-3 h-3"></i> Back to Directory
        </a>
        <span class="bg-amber-100 text-amber-800 border border-amber-300 px-2 py-0.5 text-[9px] font-black uppercase tracking-widest flex items-center gap-1">
            <i data-lucide="edit-3" class="w-3 h-3"></i> Edit Mode
        </span>
    </div>

    <div class="bg-white border-t-4 border-amber-500 border-x border-b border-slate-300 shadow-sm overflow-hidden">
        <div class="bg-slate-50 p-4 border-b border-slate-200 flex items-center gap-3">
            <div class="p-2 bg-amber-100 text-amber-800 rounded-sm">
                <i data-lucide="building" class="w-5 h-5"></i>
            </div>
            <div>
                <h2 class="text-sm font-black text-slate-900 uppercase tracking-widest">Edit Supplier Profile</h2>
                <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Updating record for ID: {{ supplier.id }}</p>
            </div>
        </div>

        <form method="POST" action="{% url 'edit_supplier' supplier.id %}" class="p-6 space-y-6">
            {% csrf_token %}
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-1 md:col-span-2">
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Company / Vendor Name <span class="text-rose-500">*</span></label>
                    <input type="text" name="name" required value="{{ supplier.name }}" 
                           class="w-full p-2.5 text-xs font-bold border border-slate-300 uppercase focus:bg-amber-50 focus:border-amber-500 outline-none transition-colors">
                </div>

                <div class="space-y-1">
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Vendor Code <span class="text-rose-500">*</span></label>
                    <input type="text" name="vendor_code" required value="{{ supplier.vendor_code }}" 
                           class="w-full p-2.5 text-xs font-bold border border-slate-300 uppercase focus:bg-amber-50 focus:border-amber-500 outline-none transition-colors">
                </div>

                <div class="space-y-1">
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Avg. Lead Time (Days)</label>
                    <input type="number" name="avg_lead_time" min="0" value="{{ supplier.avg_lead_time }}"
                           class="w-full p-2.5 text-xs font-bold border border-slate-300 uppercase focus:bg-amber-50 focus:border-amber-500 outline-none transition-colors">
                </div>
            </div>

            <div class="border-t border-slate-200 pt-6">
                <h3 class="text-[10px] font-black text-slate-800 uppercase tracking-widest mb-4"><i data-lucide="user-square" class="w-3 h-3 inline"></i> Contact Person Details</h3>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-1 md:col-span-2">
                        <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Representative Name</label>
                        <input type="text" name="contact_name" value="{{ supplier.contact_name }}" 
                               class="w-full p-2.5 text-xs font-bold border border-slate-300 uppercase focus:bg-amber-50 focus:border-amber-500 outline-none transition-colors">
                    </div>

                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Email Address</label>
                        <input type="email" name="email" value="{{ supplier.email }}" 
                               class="w-full p-2.5 text-xs font-bold border border-slate-300 focus:bg-amber-50 focus:border-amber-500 outline-none transition-colors lowercase">
                    </div>

                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Phone / Mobile Number</label>
                        <input type="text" name="phone" value="{{ supplier.phone }}" 
                               class="w-full p-2.5 text-xs font-bold border border-slate-300 uppercase focus:bg-amber-50 focus:border-amber-500 outline-none transition-colors">
                    </div>
                </div>
            </div>

            <div class="flex justify-end gap-3 pt-4">
                <a href="{% url 'supplier_master' %}" class="bg-slate-200 text-slate-700 px-6 py-2.5 text-[10px] font-black uppercase tracking-widest hover:bg-slate-300 transition-colors">Cancel</a>
                <button type="submit" class="bg-amber-600 text-white px-8 py-2.5 text-[10px] font-black uppercase tracking-widest hover:bg-amber-700 transition-colors flex items-center gap-2 shadow-md">
                    <i data-lucide="save" class="w-3.5 h-3.5"></i> Update Profile
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        if (typeof lucide !== 'undefined') lucide.createIcons();
    });
</script>
{% endblock %}
