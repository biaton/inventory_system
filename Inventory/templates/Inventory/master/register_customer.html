{% extends "Inventory/master/master_base.html" %}

{% block master_content %}
<div class="max-w-[100%] mx-auto mt-4 px-2 sm:px-4 text-slate-800 pb-12">

    <div class="mb-6 flex justify-between items-end border-b-2 border-teal-800 pb-2">
        <div>
            <h2 class="text-2xl font-black text-teal-900 uppercase tracking-tighter flex items-center gap-2">
                <i data-lucide="user-plus" class="w-7 h-7 text-teal-700"></i> New Customer Registration
            </h2>
            <p class="text-xs font-bold text-slate-500 uppercase tracking-widest mt-1">Add a new client to the masterlist</p>
        </div>
        <a href="{% url 'customer_master' %}" class="bg-slate-100 text-slate-600 border border-slate-300 px-4 py-2 text-[10px] font-black uppercase tracking-widest hover:bg-slate-200 transition-colors flex items-center gap-2 shadow-sm">
            <i data-lucide="arrow-left" class="w-3 h-3"></i> Back to List
        </a>
    </div>

    <div class="bg-white border border-slate-200 shadow-sm rounded-sm">
        <div class="bg-slate-800 text-white px-6 py-3 border-b border-slate-700 flex justify-between items-center">
            <h3 class="text-xs font-black uppercase tracking-widest flex items-center gap-2">
                <i data-lucide="contact" class="w-4 h-4 text-teal-400"></i> Customer Profile
            </h3>
            <span class="text-[9px] bg-teal-900 text-teal-300 px-2 py-0.5 font-bold rounded-full border border-teal-700">TYPE: CUSTOMER</span>
        </div>

        <form method="POST" action="{% url 'register_customer' %}" class="p-6 md:p-8">
            {% csrf_token %}

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 md:gap-8">
                
                <div class="space-y-5">
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2">Company Name / Client <span class="text-rose-500">*</span></label>
                        <div class="relative">
                            <i data-lucide="building" class="absolute left-3 top-2.5 w-4 h-4 text-slate-400"></i>
                            <input type="text" name="name" class="w-full pl-10 p-2.5 border border-slate-300 bg-slate-50 focus:bg-white focus:border-teal-500 outline-none transition-all text-xs font-bold text-slate-800 placeholder:text-slate-300 uppercase" placeholder="E.G. ABC CORPORATION" required>
                        </div>
                    </div>

                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2">Contact Person / Representative</label>
                        <div class="relative">
                            <i data-lucide="user" class="absolute left-3 top-2.5 w-4 h-4 text-slate-400"></i>
                            <input type="text" name="contact_person" class="w-full pl-10 p-2.5 border border-slate-300 bg-slate-50 focus:bg-white focus:border-teal-500 outline-none transition-all text-xs font-bold text-slate-800 placeholder:text-slate-300 uppercase" placeholder="MR. JUAN DELA CRUZ">
                        </div>
                    </div>

                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2">Phone / Mobile Number <span class="text-rose-500">*</span></label>
                        <div class="relative">
                            <i data-lucide="phone" class="absolute left-3 top-2.5 w-4 h-4 text-slate-400"></i>
                            <input type="text" name="phone" class="w-full pl-10 p-2.5 border border-slate-300 bg-slate-50 focus:bg-white focus:border-teal-500 outline-none transition-all text-xs font-bold text-slate-800 placeholder:text-slate-300 uppercase" placeholder="09XX-XXX-XXXX" required>
                        </div>
                    </div>
                </div>

                <div class="space-y-5">
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2">Email Address</label>
                        <div class="relative">
                            <i data-lucide="mail" class="absolute left-3 top-2.5 w-4 h-4 text-slate-400"></i>
                            <input type="email" name="email" class="w-full pl-10 p-2.5 border border-slate-300 bg-slate-50 focus:bg-white focus:border-teal-500 outline-none transition-all text-xs font-bold text-slate-800 placeholder:text-slate-300 lowercase" placeholder="purchasing@client.com">
                        </div>
                    </div>

                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2">Full Shipping Address</label>
                        <div class="relative">
                            <i data-lucide="map-pin" class="absolute left-3 top-3 w-4 h-4 text-slate-400"></i>
                            <textarea name="address" rows="4" class="w-full pl-10 p-2.5 border border-slate-300 bg-slate-50 focus:bg-white focus:border-teal-500 outline-none transition-all text-xs font-bold text-slate-800 placeholder:text-slate-300 uppercase resize-none" placeholder="UNIT NO., BUILDING, STREET, CITY, PROVINCE..."></textarea>
                        </div>
                    </div>
                </div>
            </div>

            <div class="mt-8 pt-6 border-t border-slate-200 flex flex-col-reverse sm:flex-row justify-end gap-3">
                <a href="{% url 'customer_master' %}" class="text-center px-6 py-3 border border-slate-300 text-slate-600 text-[10px] font-black uppercase tracking-widest hover:bg-slate-100 transition-colors w-full sm:w-auto shadow-sm">
                    Discard
                </a>
                <button type="submit" class="bg-teal-700 text-white px-8 py-3 text-[10px] font-black uppercase tracking-widest hover:bg-teal-800 transition-colors w-full sm:w-auto shadow-sm flex items-center justify-center gap-2">
                    <i data-lucide="save" class="w-4 h-4 text-teal-200"></i> Register Customer
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    // Initialize Lucide Icons
    document.addEventListener("DOMContentLoaded", function() {
        if (typeof lucide !== 'undefined') {
            lucide.createIcons();
        }
    });
</script>
{% endblock %}
