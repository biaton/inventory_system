{% extends "Inventory/master/master_base.html" %}

{% block master_content %}
<div class="max-w-3xl mx-auto pb-20 mt-4 text-slate-800">
    
    <div class="mb-4">
        <a href="{% url 'supplier_master' %}" class="text-[10px] font-black uppercase tracking-widest text-slate-500 hover:text-teal-700 flex items-center gap-1 transition-colors w-fit">
            <i data-lucide="arrow-left" class="w-3 h-3"></i> Back to Directory
        </a>
    </div>

    <div class="bg-white border-t-4 border-teal-700 border-x border-b border-slate-300 shadow-sm overflow-hidden">
        <div class="bg-slate-50 p-4 border-b border-slate-200 flex items-center gap-3">
            <div class="p-2 bg-teal-100 text-teal-800 rounded-sm">
                <i data-lucide="truck" class="w-5 h-5"></i>
            </div>
            <div>
                <h2 class="text-sm font-black text-slate-900 uppercase tracking-widest">Register New Supplier</h2>
                <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Add vendor details and contact information</p>
            </div>
        </div>

        <form method="POST" action="{% url 'register_supplier' %}" class="p-6 space-y-6">
            {% csrf_token %}
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-1 md:col-span-2">
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Company / Vendor Name <span class="text-rose-500">*</span></label>
                    <input type="text" name="name" required placeholder="e.g. ASIA INTEGRATED MACHINE INC." 
                           class="w-full p-2.5 text-xs font-bold border border-slate-300 uppercase focus:bg-teal-50 focus:border-teal-500 outline-none transition-colors">
                </div>

                <div class="space-y-1">
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Vendor Code <span class="text-rose-500">*</span></label>
                    <input type="text" name="vendor_code" required placeholder="e.g. VEND-001" 
                           class="w-full p-2.5 text-xs font-bold border border-slate-300 uppercase focus:bg-teal-50 focus:border-teal-500 outline-none transition-colors">
                </div>

                <div class="space-y-1">
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Avg. Lead Time (Days)</label>
                    <input type="number" name="avg_lead_time" placeholder="e.g. 15" min="0" value="0"
                           class="w-full p-2.5 text-xs font-bold border border-slate-300 uppercase focus:bg-teal-50 focus:border-teal-500 outline-none transition-colors">
                </div>
            </div>

            <div class="border-t border-slate-200 pt-6">
                <h3 class="text-[10px] font-black text-slate-800 uppercase tracking-widest mb-4"><i data-lucide="user-square" class="w-3 h-3 inline"></i> Contact Person Details</h3>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-1 md:col-span-2">
                        <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Representative Name</label>
                        <input type="text" name="contact_name" placeholder="e.g. JUAN DELA CRUZ" 
                               class="w-full p-2.5 text-xs font-bold border border-slate-300 uppercase focus:bg-teal-50 focus:border-teal-500 outline-none transition-colors">
                    </div>

                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Email Address</label>
                        <input type="email" name="email" placeholder="e.g. sales@vendor.com" 
                               class="w-full p-2.5 text-xs font-bold border border-slate-300 focus:bg-teal-50 focus:border-teal-500 outline-none transition-colors lowercase">
                    </div>

                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Phone / Mobile Number</label>
                        <input type="text" name="phone" placeholder="e.g. +63 912 345 6789" 
                               class="w-full p-2.5 text-xs font-bold border border-slate-300 uppercase focus:bg-teal-50 focus:border-teal-500 outline-none transition-colors">
                    </div>
                </div>
            </div>

            <div class="flex justify-end gap-3 pt-4">
                <a href="{% url 'supplier_master' %}" class="bg-slate-200 text-slate-700 px-6 py-2.5 text-[10px] font-black uppercase tracking-widest hover:bg-slate-300 transition-colors">Cancel</a>
                <button type="submit" class="bg-teal-700 text-white px-8 py-2.5 text-[10px] font-black uppercase tracking-widest hover:bg-teal-800 transition-colors flex items-center gap-2 shadow-md">
                    <i data-lucide="save" class="w-3.5 h-3.5"></i> Save Supplier
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        if (typeof lucide !== 'undefined') lucide.createIcons();
    });
</script>
{% endblock %}
