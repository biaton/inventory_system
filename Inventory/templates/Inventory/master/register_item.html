{% extends "Inventory/master/master_base.html" %}

{% block master_content %}
<div class="max-w-4xl mx-auto bg-white border border-slate-300 shadow-sm mt-4">
    <div class="bg-slate-800 px-4 py-3 border-b border-slate-700 flex justify-between items-center text-white">
        <h2 class="text-xs font-black uppercase tracking-widest flex items-center gap-2">
            <i data-lucide="package-plus" class="w-4 h-4 text-teal-400"></i> New Material Registration
        </h2>
    </div>

    <form method="POST" class="p-8">
        {% csrf_token %}
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
            <div class="space-y-4">
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Item Code <span class="text-rose-500">*</span></label>
                    <input type="text" name="item_code" required placeholder="e.g. MAT-001" 
                           class="w-full p-2.5 bg-slate-50 border border-slate-400 text-sm font-black uppercase focus:ring-1 focus:ring-teal-500 outline-none shadow-inner">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Description</label>
                    <textarea name="description" rows="3" placeholder="Full material specifications..." 
                              class="w-full p-2.5 bg-slate-50 border border-slate-400 text-xs font-bold uppercase outline-none focus:ring-1 focus:ring-teal-500 resize-none"></textarea>
                </div>
            </div>

            <div class="space-y-4">
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Unit of Measure (UOM)</label>
                    <select name="uom" class="w-full p-2.5 bg-slate-50 border border-slate-400 text-xs font-black outline-none">
                        <option value="PCS">PCS - Pieces</option>
                        <option value="KGS">KGS - Kilograms</option>
                        <option value="MTR">MTR - Meters</option>
                        <option value="SET">SET - Full Set</option>
                        <option value="ROL">ROL - Rolls</option>
                    </select>
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Category Classification</label>
                    <select name="category" class="w-full p-2.5 bg-slate-50 border border-slate-400 text-xs font-black outline-none">
                        <option value="RAW">Raw Materials</option>
                        <option value="CON">Consumables</option>
                        <option value="FG">Finished Goods</option>
                        <option value="SCRAP">Scrap/Waste</option>
                        <option value="ELEC">Electronics</option>
                        <option value="PACK">Packaging</option>
                        <option value="TOL">Tools</option>
                    </select>
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Safe Stock Level</label>
                    <input type="number" name="min_stock" value="0" class="w-full p-2.5 bg-slate-50 border border-slate-400 text-sm font-black outline-none focus:ring-1 focus:ring-rose-500">
                </div>
                <div class="mb-4">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2">Standard Unit Price (₱)</label>
                    <input type="number" step="0.01" name="unit_price" value="0.00" 
                           class="w-full p-2 border border-slate-300 bg-slate-50 focus:bg-white focus:border-teal-500 outline-none transition-all text-xs font-bold text-slate-700 placeholder:text-slate-400" 
                           placeholder="0.00" required>
                </div>
            </div>
        </div>

        <div class="pt-6 border-t border-slate-200 flex gap-3">
            <button type="submit" class="flex-1 bg-teal-700 text-white py-3 text-[11px] font-black uppercase tracking-widest hover:bg-teal-800 transition-all shadow-md border border-teal-900">
                Save to Masterlist
            </button>
            <a href="{% url 'item_master' %}" class="bg-white text-slate-500 border border-slate-300 px-10 py-3 text-[11px] font-black uppercase tracking-widest hover:bg-slate-50 transition-all flex items-center justify-center">
                Discard
            </a>
        </div>
    </form>
</div>
{% endblock %}
