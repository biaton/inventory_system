{% extends "Inventory/base.html" %}

{% block title %}Master Data Management{% endblock %}

{% block content %}
<div class="w-full px-2 sm:px-4 mt-4 text-slate-800">
    
    <div class="border-b-2 border-slate-800 pb-2 mb-4 flex flex-col md:flex-row md:items-end md:justify-between">
        <div>
            <h1 class="text-2xl font-black text-slate-900 uppercase tracking-tighter flex items-center gap-2">
                <i data-lucide="database" class="w-6 h-6 text-teal-700"></i> System Master Configuration
            </h1>
        </div>
        <div class="text-xs font-bold text-slate-500 uppercase tracking-widest mt-2 md:mt-0">
            System Records & Entity Directory
        </div>
    </div>

    <div class="mb-4 bg-slate-100 border border-slate-300 p-1 flex flex-wrap gap-1 shadow-sm">
        <a href="{% url 'settings_master' %}" class="flex-1 flex items-center justify-center px-4 py-1.5 text-[10px] font-black uppercase tracking-widest transition-colors {% if 'settings' in request.path %} bg-slate-800 text-white {% else %} text-slate-600 hover:bg-slate-200 {% endif %}">
            <i data-lucide="settings" class="w-3 h-3 mr-2"></i> System
        </a>
        <a href="{% url 'item_master' %}" class="flex-1 flex items-center justify-center px-4 py-1.5 text-[10px] font-black uppercase tracking-widest transition-colors {% if 'item' in request.path %} bg-teal-700 text-white {% else %} text-slate-600 hover:bg-slate-200 {% endif %}">
            <i data-lucide="package" class="w-3 h-3 mr-2"></i> Items
        </a>
        <a href="{% url 'supplier_master' %}" class="flex-1 flex items-center justify-center px-4 py-1.5 text-[10px] font-black uppercase tracking-widest transition-colors {% if 'supplier' in request.path %} bg-teal-700 text-white {% else %} text-slate-600 hover:bg-slate-200 {% endif %}">
            <i data-lucide="truck" class="w-3 h-3 mr-2"></i> Suppliers
        </a>
        <a href="{% url 'customer_master' %}" class="flex-1 flex items-center justify-center px-4 py-1.5 text-[10px] font-black uppercase tracking-widest transition-colors {% if 'customer' in request.path %} bg-teal-700 text-white {% else %} text-slate-600 hover:bg-slate-200 {% endif %}">
            <i data-lucide="users" class="w-3 h-3 mr-2"></i> Customers
        </a>
        <a href="{% url 'location_master' %}" class="flex-1 flex items-center justify-center px-4 py-1.5 text-[10px] font-black uppercase tracking-widest transition-colors {% if 'location' in request.path %} bg-teal-700 text-white {% else %} text-slate-600 hover:bg-slate-200 {% endif %}">
            <i data-lucide="map-pin" class="w-3 h-3 mr-2"></i> Locations
        </a>
        
    </div>

    <div class="transition-all duration-300">
        {% block master_content %}{% endblock %}
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        if (typeof lucide !== 'undefined') lucide.createIcons();
    });
</script>
{% endblock %}
