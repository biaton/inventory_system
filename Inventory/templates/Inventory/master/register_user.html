{% extends "Inventory/base.html" %}

{% block content %}
<div class="max-w-4xl mx-auto pb-20 mt-8 text-slate-800">
    
    <div class="bg-white border border-slate-300 shadow-sm">
        <div class="bg-slate-800 px-4 py-3 border-b border-slate-700 flex justify-between items-center text-white">
            <h2 class="text-xs font-black uppercase tracking-widest flex items-center gap-2">
                <i data-lucide="{% if profile %}user-cog{% else %}user-plus{% endif %}" class="w-4 h-4 text-teal-400"></i> 
                {% if profile %} Edit Master Record {% else %} Create New User Record {% endif %}
            </h2>
            <span class="text-[10px] font-black text-teal-400 uppercase tracking-widest bg-slate-900 px-2 py-1 border border-slate-600">
                ID: {% if profile %}{{ profile.user.username }}{% else %}NEW-USER{% endif %}
            </span>
        </div>

        <form method="POST" class="p-8">
            {% csrf_token %}
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
                
                <div class="space-y-4">
                    <h3 class="text-[11px] font-black text-slate-800 uppercase tracking-widest border-b border-slate-200 pb-2 flex items-center gap-2">
                        <i data-lucide="shield-check" class="w-3.5 h-3.5 text-slate-500"></i> Account Credentials
                    </h3>
                    
                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Username <span class="text-rose-500">*</span></label>
                        <input type="text" name="username" value="{{ profile.user.username|default:'' }}" required 
                               class="w-full p-2.5 bg-slate-50 border border-slate-400 text-sm font-black outline-none focus:ring-1 focus:ring-teal-500"
                               {% if profile %}readonly title="Cannot change username"{% endif %}>
                    </div>

                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Password {% if not profile %}<span class="text-rose-500">*</span>{% endif %}</label>
                        <input type="password" name="password" placeholder="{% if profile %}Leave blank to keep current{% else %}Assign a secure password...{% endif %}" {% if not profile %}required{% endif %}
                               class="w-full p-2.5 bg-slate-50 border border-slate-400 text-sm font-bold outline-none focus:ring-1 focus:ring-teal-500 placeholder:text-xs">
                    </div>
                    
                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Email Address</label>
                        <input type="email" name="email" value="{{ profile.user.email|default:'' }}" placeholder="test@gmail.com"
                               class="w-full p-2.5 bg-slate-50 border border-slate-400 text-sm font-bold outline-none focus:ring-1 focus:ring-teal-500">
                    </div>

                    <div class="space-y-1 pt-2">
                        <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest">System Access</label>
                        <select name="is_active" class="w-full p-2.5 bg-slate-50 border border-slate-400 text-xs font-black outline-none {% if profile and not profile.user.is_active %}text-rose-700{% else %}text-emerald-700{% endif %}">
                            <option value="True" {% if not profile or profile.user.is_active %}selected{% endif %}>ACTIVE - Can login</option>
                            <option value="False" {% if profile and not profile.user.is_active %}selected{% endif %}>SUSPENDED - Locked out</option>
                        </select>
                    </div>
                </div>

                <div class="space-y-4">
                    <h3 class="text-[11px] font-black text-slate-800 uppercase tracking-widest border-b border-slate-200 pb-2 flex items-center gap-2">
                        <i data-lucide="briefcase" class="w-3.5 h-3.5 text-slate-500"></i> Profile Information
                    </h3>

                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Account Role</label>
                        <select name="role" class="w-full p-2.5 bg-slate-50 border border-slate-400 text-xs font-black outline-none">
                            <option value="WH_STAFF" {% if profile.role == 'WH_STAFF' %}selected{% endif %}>Warehouse Staff</option>
                            <option value="INV_MANAGER" {% if profile.role == 'INV_MANAGER' %}selected{% endif %}>Inventory Manager</option>
                            <option value="SUPPLY_CHAIN" {% if profile.role == 'SUPPLY_CHAIN' %}selected{% endif %}>Supply Chain</option>
                            <option value="PURCHASING" {% if profile.role == 'PURCHASING' %}selected{% endif %}>Purchasing Officer</option>
                            <option value="SALES" {% if profile.role == 'SALES' %}selected{% endif %}>Sales Staff</option>
                            <option value="ACCOUNTING" {% if profile.role == 'ACCOUNTING' %}selected{% endif %}>Accounting</option>
                            <option value="OWNER" {% if profile.role == 'OWNER' %}selected{% endif %}>Management / Owner</option>
                            <option value="SYSTEM_ADMIN" {% if profile.role == 'SYSTEM_ADMIN' %}selected{% endif %}>System Administrator</option>
                        </select>
                    </div>

                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Company / Department</label>
                        <input type="text" name="company_name" value="{{ profile.company_name|default:'' }}" placeholder="e.g. Sales Dept, External Client..."
                               class="w-full p-2.5 bg-slate-50 border border-slate-400 text-xs font-bold uppercase outline-none focus:ring-1 focus:ring-teal-500">
                    </div>

                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Contact Number</label>
                        <input type="text" name="contact_number" value="{{ profile.contact_number|default:'' }}" placeholder="e.g. +639847123456"
                               class="w-full p-2.5 bg-slate-50 border border-slate-400 text-xs font-bold uppercase outline-none focus:ring-1 focus:ring-teal-500">
                    </div>
                </div>
            </div>

            <div class="pt-6 border-t border-slate-200 flex gap-3">
                <button type="submit" class="flex-1 bg-teal-700 text-white py-3 text-[11px] font-black uppercase tracking-widest hover:bg-teal-800 transition-all shadow-md border border-teal-900 flex justify-center items-center gap-2">
                    <i data-lucide="save" class="w-4 h-4"></i> {% if profile %}Commit Changes{% else %}Register User{% endif %}
                </button>
                <a href="{% url 'user_master' %}" class="bg-white text-slate-500 border border-slate-300 px-10 py-3 text-[11px] font-black uppercase tracking-widest hover:bg-slate-50 transition-all flex items-center justify-center">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        if (typeof lucide !== 'undefined') {
            lucide.createIcons();
        }
    });
</script>
{% endblock %}
