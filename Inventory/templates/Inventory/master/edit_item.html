{% extends "Inventory/master/master_base.html" %}

{% block master_content %}
<div class="max-w-4xl mx-auto bg-white border border-slate-300 shadow-sm">
    <div class="bg-slate-800 px-4 py-3 border-b border-slate-700 flex justify-between items-center text-white">
        <h2 class="text-xs font-black uppercase tracking-widest">Edit Item Master Record</h2>
        <span class="text-[10px] font-black text-teal-400 uppercase tracking-widest">{{ item.item_code }}</span>
    </div>
    
    <form method="POST" class="p-6 grid grid-cols-1 md:grid-cols-2 gap-6">
        {% csrf_token %}
        
        <div class="space-y-1">
            <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Item Description</label>
            <input type="text" name="description" value="{{ item.description }}" required class="w-full p-2 bg-slate-50 border border-slate-400 text-xs font-bold uppercase outline-none focus:bg-white focus:ring-1 focus:ring-teal-500">
        </div>

        <div class="space-y-1">
            <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Unit of Measure (UOM)</label>
            <select name="uom" class="w-full p-2 bg-slate-50 border border-slate-400 text-xs font-bold outline-none">
                <option value="PCS" {% if item.uom == 'PCS' %}selected{% endif %}>PCS - Pieces</option>
                <option value="KGS" {% if item.uom == 'KGS' %}selected{% endif %}>KGS - Kilograms</option>
                <option value="MTR" {% if item.uom == 'MTR' %}selected{% endif %}>MTR - Meters</option>
            </select>
        </div>

        <div class="md:col-span-2 pt-4 flex gap-2">
            <button type="submit" class="flex-1 bg-teal-700 text-white py-2 text-[10px] font-black uppercase tracking-widest hover:bg-teal-800 transition-all border border-teal-900 shadow-md">
                Update Record
            </button>
            <a href="{% url 'item_master' %}" class="bg-white text-slate-500 border border-slate-300 px-8 py-2 text-[10px] font-black uppercase tracking-widest hover:bg-slate-50 transition-all flex items-center justify-center">
                Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
