{% extends "Inventory/base.html" %}

{% block content %}
<div class="max-w-2xl mx-auto mt-6 px-4 text-slate-800">

    <div class="bg-white border border-slate-400 shadow-sm">
        
        <div class="bg-slate-800 px-4 py-3 flex justify-between items-center text-white">
            <h2 class="font-black text-sm uppercase tracking-widest flex items-center">
                <i data-lucide="shield-check" class="w-4 h-4 mr-2 text-teal-400"></i> Security Settings
            </h2>
            <span class="text-[9px] text-slate-400 tracking-[0.2em] uppercase">User Authentication</span>
        </div>

        <div class="p-6">
            <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-6 border-b border-slate-200 pb-2">
                Update your account password securely.
            </p>

            <form method="POST" action="{% url 'change_password' %}" class="space-y-4">
                {% csrf_token %}

                <div class="bg-slate-50 p-4 border border-slate-200 space-y-2">
                    <label class="text-[10px] font-black text-slate-600 uppercase tracking-widest">Current Password <span class="text-rose-600">*</span></label>
                    <div class="relative">
                        <i data-lucide="lock" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                        <input type="password" name="old_password" required placeholder="Enter current password"
                               class="w-full p-2 pl-9 border border-slate-400 bg-white text-xs font-bold focus:bg-emerald-50 focus:outline-none focus:border-teal-500 transition-colors">
                    </div>
                </div>

                <div class="bg-slate-50 p-4 border border-slate-200 space-y-4">
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-600 uppercase tracking-widest">New Password <span class="text-rose-600">*</span></label>
                        <div class="relative">
                            <i data-lucide="key" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-teal-600"></i>
                            <input type="password" name="new_password" required placeholder="Minimum 8 characters"
                                   class="w-full p-2 pl-9 border border-slate-400 bg-white text-xs font-bold focus:bg-emerald-50 focus:outline-none focus:border-teal-500 transition-colors">
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-600 uppercase tracking-widest">Confirm New Password <span class="text-rose-600">*</span></label>
                        <div class="relative">
                            <i data-lucide="check-square" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-teal-600"></i>
                            <input type="password" name="confirm_password" required placeholder="Re-type new password"
                                   class="w-full p-2 pl-9 border border-slate-400 bg-white text-xs font-bold focus:bg-emerald-50 focus:outline-none focus:border-teal-500 transition-colors">
                        </div>
                    </div>
                </div>

                <div class="flex justify-end pt-4 mt-4">
                    <button type="submit" onclick="return confirm('Are you sure you want to update your password?')" class="bg-teal-700 text-white px-8 py-2.5 text-xs font-black uppercase tracking-widest hover:bg-teal-800 transition-colors flex items-center gap-2 border border-teal-900 shadow-sm">
                        <i data-lucide="save" class="w-4 h-4"></i> Update Password
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        if (typeof lucide !== 'undefined') { lucide.createIcons(); }
    });
</script>
{% endblock %}
