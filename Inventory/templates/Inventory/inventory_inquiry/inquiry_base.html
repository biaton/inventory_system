{% extends "Inventory/base.html" %} 

{% block title %}Inventory Inquiry{% endblock %}

{% block content %}
<div class="w-full px-2 sm:px-4 mt-4 text-slate-800 font-sans">
    
    <div class="border-b-2 border-slate-800 pb-2 mb-4 flex flex-col md:flex-row md:items-end md:justify-between">
        <div>
            <h1 class="text-2xl font-black text-slate-900 uppercase tracking-tighter flex items-center gap-2">
                <i data-lucide="file-search" class="w-6 h-6 text-blue-700"></i> Inventory Inquiry
            </h1>
        </div>
        <div class="text-xs font-bold text-slate-500 uppercase tracking-widest mt-2 md:mt-0">
            Reports, Analytics & Masterlist
        </div>
    </div>

    <div class="mb-4 bg-slate-100 border border-slate-300 p-1 flex flex-wrap gap-1 shadow-sm">
        
        <a href="{% url 'stock_inquiry' %}" 
           class="flex-1 flex items-center justify-center px-2 py-1.5 text-[10px] md:text-xs font-black uppercase tracking-widest transition-colors 
           {% if request.resolver_match.url_name == 'stock_inquiry' %} bg-blue-700 text-white shadow-sm border border-blue-900 {% else %} text-slate-600 hover:bg-slate-200 border border-transparent {% endif %}">
            <i data-lucide="package-search" class="w-3 h-3 mr-1.5"></i>
            <span class="hidden sm:inline">Stock Inquiry</span>
        </a>

        <a href="{% url 'stock_item_inquiry' %}" 
           class="flex-1 flex items-center justify-center px-2 py-1.5 text-[10px] md:text-xs font-black uppercase tracking-widest transition-colors 
           {% if request.resolver_match.url_name == 'stock_item_inquiry' %} bg-teal-600 text-white shadow-sm border border-teal-800 {% else %} text-slate-600 hover:bg-slate-200 border border-transparent {% endif %}">
            <i data-lucide="list-tree" class="w-3 h-3 mr-1.5"></i>
            <span class="hidden sm:inline">Item Masterlist</span>
        </a>

        <a href="{% url 'stock_history' %}" 
           class="flex-1 flex items-center justify-center px-2 py-1.5 text-[10px] md:text-xs font-black uppercase tracking-widest transition-colors 
           {% if request.resolver_match.url_name == 'stock_history' %} bg-amber-600 text-white shadow-sm border border-amber-800 {% else %} text-slate-600 hover:bg-slate-200 border border-transparent {% endif %}">
            <i data-lucide="history" class="w-3 h-3 mr-1.5"></i>
            <span class="hidden sm:inline">Stock History</span>
        </a>

        <a href="{% url 'request_inquiry' %}" 
           class="flex-1 flex items-center justify-center px-2 py-1.5 text-[10px] md:text-xs font-black uppercase tracking-widest transition-colors 
           {% if request.resolver_match.url_name == 'request_inquiry' %} bg-indigo-600 text-white shadow-sm border border-indigo-800 {% else %} text-slate-600 hover:bg-slate-200 border border-transparent {% endif %}">
            <i data-lucide="clipboard-list" class="w-3 h-3 mr-1.5"></i>
            <span class="hidden sm:inline">Request Log</span>
        </a>

        <a href="{% url 'inquiry_settings' %}" 
           class="flex-1 flex items-center justify-center px-2 py-1.5 text-[10px] md:text-xs font-black uppercase tracking-widest transition-colors 
           {% if request.resolver_match.url_name == 'inquiry_settings' %} bg-slate-800 text-white shadow-sm border border-slate-900 {% else %} text-slate-600 hover:bg-slate-200 border border-transparent {% endif %}">
            <i data-lucide="settings" class="w-3 h-3 mr-1.5"></i>
            <span class="hidden sm:inline">Settings</span>
        </a>

    </div>

    <div class="transition-all duration-300 transform">
        {% block inquiry_content %}
        {% endblock %}
    </div>

</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        if (typeof lucide !== 'undefined') {
            lucide.createIcons();
        }
    });
</script>
{% endblock %}
